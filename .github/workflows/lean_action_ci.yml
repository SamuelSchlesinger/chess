name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Verify pinned corpus hashes
        run: sha256sum --check data/SHA256SUMS
      - uses: leanprover/lean-action@v1
      - name: Validate pinned chess corpus
        run: lake exe chess_validate
